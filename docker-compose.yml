version: "3.8"

services:

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8081:8081"

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    depends_on:
      - product-service

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8083:8083"

  ai-agent-service:
    build: ./ai-agent-service
    container_name: ai-agent-service
    ports:
      - "8084:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PRODUCT_SERVICE_URL=http://product-service:8081/products
    depends_on:
      - product-service

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - order-service
      - product-service
      - ai-agent-service