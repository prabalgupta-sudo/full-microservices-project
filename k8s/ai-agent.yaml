apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agent-service
  template:
    metadata:
      labels:
        app: ai-agent-service
    spec:
      containers:
        - name: ai-agent
          image: ai-agent-service
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
---
apiVersion: v1
kind: Service
metadata:
  name: ai-agent-service
spec:
  type: NodePort
  selector:
    app: ai-agent-service
  ports:
    - port: 8084
      targetPort: 8084
      nodePort: 30004