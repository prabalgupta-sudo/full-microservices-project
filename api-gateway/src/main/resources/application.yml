server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://auth-service:8083
          predicates:
            - Path=/auth/**

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/orders/**

        - id: product-service
          uri: http://product-service:8081
          predicates:
            - Path=/products/**
        - id: ai-agent
          uri: http://ai-agent-service:8084
          predicates:
            - Path=/agent/**