server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://auth-service:8083
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/orders/**
          filters:
            - StripPrefix=1

        - id: product-service
          uri: http://product-service:8081
          predicates:
            - Path=/products/**
          filters:
            - StripPrefix=1